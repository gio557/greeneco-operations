name: CI

# Collaudo automatico: esegue i test e verifica la build a ogni push e su ogni
# pull request, così un errore non arriva (da solo) in produzione.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
